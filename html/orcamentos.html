<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamentos - Alexandre Reparos Automotivos</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>

<body>
    <div class="container">
        <header class="main-header">
            <div class="logo">
                <h1>Alexandre Reparos Automotivos</h1>
            </div>
            <button class="hamburger" id="hamburger-btn" aria-label="Abrir menu" aria-expanded="false" aria-controls="main-nav">
                <span class="lines" aria-hidden="true">
                    <span></span><span></span><span></span>
                </span>
            </button>
            <nav class="main-nav" id="main-nav">
                <ul>
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="clientes.html">Clientes</a></li>
                    <li><a href="veiculos.html">Veículos</a></li>
                    <li><a href="orcamentos.html" class="active">Orçamentos</a></li>
                    <li><a href="financeiro.html">Financeiro</a></li>
                </ul>
            </nav>

            <div class="user-info" id="user-info">
                <!-- Preenchido por JavaScript -->
            </div>
        </header>

        <main class="main-content">
            <div class="dashboard-section">
                <div class="section-header">
                    <h2>Gerenciamento de Orçamentos</h2>
                    <button id="btn-novo-orcamento" class="btn btn-success">+ Novo Orçamento</button>
                </div>

                <div class="table-container">
                    <div class="table-responsive">
                        <table class="data-table" id="orcamentos-table">
                            <thead>
                                <tr>
                                    <th>Número</th>
                                    <th>Cliente</th>
                                    <th>Veículo</th>
                                    <th>Valor Total</th>
                                    <th>Status</th>
                                    <th>Data</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="orcamentos-body">
                                <!-- Dados serão carregados aqui -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="loader" id="orcamentos-loader"></div>
            </div>
        </main>

        <footer class="main-footer">
            <p>&copy; 2025 Alexandre Reparos Automotivos. Todos os direitos reservados.</p>
        </footer>
    </div>

    <!-- Modal para orçamento -->
    <div id="orcamento-modal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <button class="modal-close">&times;</button>
            <h2 class="modal-title" id="modal-title-orcamento">Novo Orçamento</h2>
            <form id="form-orcamento">
                <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="orcamento-numero">Número do Orçamento</label>
                        <input type="text" id="orcamento-numero" readonly style="background-color: #f5f5f5;">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="orcamento-status">Status</label>
                        <select id="orcamento-status">
                            <option value="pendente">Pendente</option>
                            <option value="aprovado">Aprovado</option>
                            <option value="recusado">Recusado</option>
                            <option value="pago">Pago</option>
                        </select>
                    </div>
                </div>

                <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="orcamento-cliente">Cliente cadastrado</label>
                        <select id="orcamento-cliente">
                            <option value="">Carregando clientes...</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="orcamento-veiculo">Veículo cadastrado</label>
                        <select id="orcamento-veiculo">
                            <option value="">Carregando veículos...</option>
                        </select>
                    </div>
                </div>

                <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="orcamento-cliente-manual">Cliente avulso</label>
                        <input type="text" id="orcamento-cliente-manual" placeholder="Nome do cliente sem cadastro">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="orcamento-veiculo-manual">Veículo avulso</label>
                        <input type="text" id="orcamento-veiculo-manual" placeholder="Ex: Gol prata ABC-1234">
                    </div>
                </div>

                <div class="form-group">
                    <label for="orcamento-descricao">Descrição do Serviço</label>
                    <textarea id="orcamento-descricao" rows="4"
                        placeholder="Descreva os serviços a serem realizados"></textarea>
                </div>

                <div class="form-group">
                    <label>Itens do Orçamento</label>
                    <div id="orcamento-itens">
                        <div class="item-orcamento">
                            <select class="item-descricao item-descricao-select" style="flex: 2;" aria-label="Peça/serviço">
                                <option value="">Selecione uma peça/serviço...</option>
                            </select>

                            <input type="text" placeholder="Ou escreva aqui a descrição do item" class="item-descricao item-descricao-input" style="flex: 2;" />

                            <input type="number" placeholder="Quantidade" class="item-quantidade" min="1" value="1" style="flex: 1;">
                            <input type="number" placeholder="Valor unitário" class="item-valor" step="0.01" min="0" style="flex: 1;">

                            <button type="button" class="btn btn-sm btn-danger remover-item">×</button>
                        </div>
                    </div>
                    <button type="button" id="btn-add-item" class="btn btn-sm btn-secondary" style="margin-top: 10px;">+
                        Adicionar Item</button>
                </div>


                <div class="form-group">
                    <label for="orcamento-observacoes">Observações</label>
                    <textarea id="orcamento-observacoes" rows="3"></textarea>
                </div>

                <div class="form-group" style="text-align: right; font-size: 1.2rem; font-weight: bold;">
                    <label>Total: <span id="orcamento-total">R$ 0,00</span></label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="btn-salvar-orcamento">Salvar Orçamento</button>
                    <button type="button" class="btn btn-secondary modal-close">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/firebase-config.js"></script>
    <script>
        // Menu lateral / hamburguer
        document.addEventListener('DOMContentLoaded', function () {
            const btn = document.getElementById('hamburger-btn');
            const nav = document.getElementById('main-nav');
            if (!btn || !nav) return;

            btn.addEventListener('click', function () {
                const isOpen = nav.classList.toggle('open');
                btn.setAttribute('aria-expanded', String(isOpen));
            });

            nav.querySelectorAll('a').forEach(link => {
                link.addEventListener('click', () => {
                    if (window.matchMedia('(max-width: 1200px)').matches) {
                        nav.classList.remove('open');
                        btn.setAttribute('aria-expanded', 'false');
                    }
                });
            });
        });

        // Gerenciamento de Orçamentos
        document.addEventListener('DOMContentLoaded', function () {
            // Verificar autenticação
            auth.onAuthStateChanged(function (user) {
                if (user) {
                    loadUserInfo(user);
                    loadOrcamentos();
                    loadDadosParaFormulario();
                } else {
                    window.location.href = 'login.html';
                }
            });

            // Configurar informações do usuário
            function loadUserInfo(user) {
                const userInfo = document.getElementById('user-info');
                if (userInfo) {
                    userInfo.innerHTML = `
                        <span class="user-email">${user.email}</span>
                        <button id="logout-btn" class="btn btn-sm btn-danger">Sair</button>
                    `;

                    document.getElementById('logout-btn').addEventListener('click', function () {
                        auth.signOut().then(() => {
                            window.location.href = 'login.html';
                        });
                    });
                }
            }

            // Elementos do DOM
            const orcamentosBody = document.getElementById('orcamentos-body');
            const orcamentosLoader = document.getElementById('orcamentos-loader');
            const orcamentoModal = document.getElementById('orcamento-modal');
            const modalTitle = document.getElementById('modal-title-orcamento');
            const formOrcamento = document.getElementById('form-orcamento');
            const selectCliente = document.getElementById('orcamento-cliente');
            const selectVeiculo = document.getElementById('orcamento-veiculo');
            const clienteManualInput = document.getElementById('orcamento-cliente-manual');
            const veiculoManualInput = document.getElementById('orcamento-veiculo-manual');
            const itensContainer = document.getElementById('orcamento-itens');
            let orcamentoAtualId = null;
            let clientesMap = {};
            let veiculosMap = {};
            const itensPredefinidos = [
                { descricao: 'Funilaria e pintura de painel', valor: 450 },
                { descricao: 'Polimento técnico', valor: 180 },
                { descricao: 'Cristalização de pintura', valor: 250 },
                { descricao: 'Troca de para-choque', valor: 320 },
                { descricao: 'Reparo de para-choque', valor: 260 },
                { descricao: 'Martelinho de ouro', valor: 180 },
                { descricao: 'Pintura de porta', valor: 520 },
                { descricao: 'Pintura de capô', valor: 620 },
                { descricao: 'Alinhamento de peça', valor: 160 },
                { descricao: 'Material de pintura', valor: 140 },
                { descricao: 'Pintura de para-lama', valor: 420 },
                { descricao: 'Pintura de teto', valor: 780 },
                { descricao: 'Pintura de tampa traseira', valor: 560 },
                { descricao: 'Pintura de lateral completa', valor: 980 },
                { descricao: 'Retoque localizado', valor: 160 },
                { descricao: 'Preparação de superfície', valor: 220 },
                { descricao: 'Aplicação de primer', valor: 180 },
                { descricao: 'Verniz automotivo', valor: 190 },
                { descricao: 'Massa poliéster', valor: 90 },
                { descricao: 'Lixa e acabamento', valor: 75 },
                { descricao: 'Desmontagem e montagem de porta', valor: 180 },
                { descricao: 'Desmontagem e montagem de para-choque', valor: 160 },
                { descricao: 'Troca de farol', valor: 140 },
                { descricao: 'Troca de lanterna', valor: 120 },
                { descricao: 'Troca de retrovisor', valor: 130 },
                { descricao: 'Troca de grade dianteira', valor: 150 },
                { descricao: 'Solda plástica', valor: 220 },
                { descricao: 'Solda em chapa', valor: 260 },
                { descricao: 'Recuperação de suporte', valor: 180 },
                { descricao: 'Alinhamento de capô', valor: 180 },
                { descricao: 'Alinhamento de porta', valor: 160 },
                { descricao: 'Higienização técnica pós-serviço', valor: 120 },
                { descricao: 'Lavagem técnica', valor: 80 },
                { descricao: 'Compra de peça sob encomenda', valor: 0 }
            ];

            function montarOpcoesItens(descricaoSelecionada = '') {
                const opcoes = ['<option value="">Selecione uma peça/serviço...</option>'];
                itensPredefinidos.forEach(item => {
                    const selected = item.descricao === descricaoSelecionada ? ' selected' : '';
                    opcoes.push(`<option value="${item.descricao}" data-valor="${item.valor}"${selected}>${item.descricao}</option>`);
                });
                return opcoes.join('');
            }

            function descricaoDoItem(item) {
                const textoLivre = item.querySelector('.item-descricao-input')?.value.trim();
                const textoSelect = item.querySelector('.item-descricao-select')?.value.trim();
                return textoLivre || textoSelect || '';
            }

            function configurarItemOrcamento(item) {
                const select = item.querySelector('.item-descricao-select');
                const valorInput = item.querySelector('.item-valor');

                if (select) {
                    select.innerHTML = montarOpcoesItens(select.dataset.selected || select.value);
                    select.addEventListener('change', function () {
                        const valorSugerido = this.options[this.selectedIndex]?.dataset.valor;
                        if (valorSugerido && valorInput && (!valorInput.value || Number(valorInput.value) === 0)) {
                            valorInput.value = valorSugerido;
                            calcularTotalOrcamento();
                        }
                    });
                }

                item.querySelectorAll('.item-descricao-input, .item-quantidade, .item-valor').forEach(input => {
                    input.addEventListener('input', calcularTotalOrcamento);
                });

                item.querySelector('.remover-item')?.addEventListener('click', function () {
                    if (itensContainer.children.length > 1) {
                        item.remove();
                        calcularTotalOrcamento();
                    }
                });
            }

            function criarItemOrcamentoHTML(item = {}) {
                item = item || {};
                const descricao = item.descricao || '';
                const itemPredefinido = itensPredefinidos.some(opcao => opcao.descricao === descricao);
                const textoLivre = itemPredefinido ? '' : descricao;
                const valor = item.valorUnitario ?? '';
                const quantidade = item.quantidade ?? 1;

                return `
                    <select class="item-descricao item-descricao-select" data-selected="${itemPredefinido ? descricao : ''}" aria-label="Peça ou serviço">
                        ${montarOpcoesItens(itemPredefinido ? descricao : '')}
                    </select>
                    <input type="text" placeholder="Digite outro serviço ou peça" class="item-descricao item-descricao-input" value="${textoLivre}">
                    <input type="number" placeholder="Quantidade" class="item-quantidade" min="1" value="${quantidade}">
                    <input type="number" placeholder="Valor unitário" class="item-valor" step="0.01" min="0" value="${valor}">
                    <button type="button" class="btn btn-sm btn-danger remover-item">Remover</button>
                `;
            }

            function adicionarItemOrcamento(item = {}) {
                const novoItem = document.createElement('div');
                novoItem.className = 'item-orcamento';
                novoItem.innerHTML = criarItemOrcamentoHTML(item);
                itensContainer.appendChild(novoItem);
                configurarItemOrcamento(novoItem);
                calcularTotalOrcamento();
                return novoItem;
            }

            function resetarItensOrcamento(itens = [{}]) {
                itensContainer.innerHTML = '';
                const itensParaRenderizar = Array.isArray(itens) && itens.length > 0 ? itens : [{}];
                itensParaRenderizar.forEach(item => adicionarItemOrcamento(item));
                calcularTotalOrcamento();
            }

            resetarItensOrcamento();

            // Carregar dados para o formulário
            function loadDadosParaFormulario() {
                // Carregar clientes
                db.collection('clientes').orderBy('nome').get()
                    .then((snapshot) => {
                        selectCliente.innerHTML = '<option value="">Selecione um cliente</option>';
                        clientesMap = {};

                        snapshot.forEach((doc) => {
                            const cliente = doc.data();
                            const option = document.createElement('option');
                            option.value = doc.id;
                            option.textContent = cliente.nome;
                            selectCliente.appendChild(option);
                            clientesMap[doc.id] = cliente.nome;
                        });
                    })
                    .catch((error) => {
                        console.error('Erro ao carregar clientes:', error);
                        selectCliente.innerHTML = '<option value="">Erro ao carregar clientes</option>';
                    });

                // Carregar veículos
                db.collection('veiculos').orderBy('placa').get()
                    .then((snapshot) => {
                        selectVeiculo.innerHTML = '<option value="">Selecione um veículo</option>';
                        veiculosMap = {};

                        snapshot.forEach((doc) => {
                            const veiculo = doc.data();
                            const option = document.createElement('option');
                            option.value = doc.id;
                            option.textContent = `${veiculo.placa} - ${veiculo.marca} ${veiculo.modelo}`;
                            selectVeiculo.appendChild(option);
                            veiculosMap[doc.id] = `${veiculo.placa} - ${veiculo.marca} ${veiculo.modelo}`;
                        });
                    })
                    .catch((error) => {
                        console.error('Erro ao carregar veículos:', error);
                        selectVeiculo.innerHTML = '<option value="">Erro ao carregar veículos</option>';
                    });
            }

            // Carregar orçamentos
            function loadOrcamentos() {
                orcamentosLoader.style.display = 'block';
                orcamentosBody.innerHTML = '';

                Promise.all([
                    db.collection('orcamentos').orderBy('data', 'desc').get(),
                    db.collection('clientes').get(),
                    db.collection('veiculos').get()
                ])
                    .then(([orcamentosSnapshot, clientesSnapshot, veiculosSnapshot]) => {
                        orcamentosLoader.style.display = 'none';

                        // Criar mapas
                        const clientesMapLocal = {};
                        clientesSnapshot.forEach(doc => {
                            clientesMapLocal[doc.id] = doc.data().nome;
                        });

                        const veiculosMapLocal = {};
                        veiculosSnapshot.forEach(doc => {
                            const veiculo = doc.data();
                            veiculosMapLocal[doc.id] = `${veiculo.placa} - ${veiculo.marca} ${veiculo.modelo}`;
                        });

                        if (orcamentosSnapshot.empty) {
                            orcamentosBody.innerHTML = `
                            <tr>
                                <td colspan="7" class="text-center">Nenhum orçamento cadastrado.</td>
                            </tr>
                        `;
                            return;
                        }

                        orcamentosSnapshot.forEach((doc) => {
                            const orcamento = doc.data();
                            const dataFormatada = orcamento.data ?
                                orcamento.data.toDate().toLocaleDateString('pt-BR') : '';

                            const row = document.createElement('tr');
                            row.innerHTML = `
                            <td>${orcamento.numero || ''}</td>
                            <td>${clientesMapLocal[orcamento.clienteId] || orcamento.clienteNome || 'Cliente avulso'}</td>
                            <td>${veiculosMapLocal[orcamento.veiculoId] || orcamento.veiculoDescricao || 'Veículo avulso'}</td>
                            <td>R$ ${(orcamento.valorTotal || 0).toFixed(2)}</td>
                            <td><span class="status-badge status-${orcamento.status || 'pendente'}">${getStatusText(orcamento.status)}</span></td>
                            <td>${dataFormatada}</td>
                            <td class="actions">
                                <button class="btn btn-sm btn-primary" onclick="visualizarOrcamento('${doc.id}')">Ver</button>
                                <button class="btn btn-sm btn-warning" onclick="editarOrcamento('${doc.id}')">Editar</button>
                                <button class="btn btn-sm btn-success" data-orcamento-id="${doc.id}">PDF</button>
                                <button class="btn btn-sm btn-danger" onclick="excluirOrcamento('${doc.id}')">Excluir</button>
                            </td>
                        `;
                            orcamentosBody.appendChild(row);
                        });

                        // Adicionar eventos para os botões PDF
                        document.querySelectorAll('.btn-success[data-orcamento-id]').forEach(button => {
                            button.addEventListener('click', function () {
                                const orcamentoId = this.getAttribute('data-orcamento-id');
                                gerarPDF(orcamentoId, this);
                            });
                        });
                    })
                    .catch((error) => {
                        console.error('Erro ao carregar orçamentos:', error);
                        orcamentosLoader.style.display = 'none';
                        orcamentosBody.innerHTML = `
                        <tr>
                            <td colspan="7" class="text-center">Erro ao carregar orçamentos.</td>
                        </tr>
                    `;
                    });
            }

            // Obter texto do status
            function getStatusText(status) {
                const statusMap = {
                    'pendente': 'Pendente',
                    'aprovado': 'Aprovado',
                    'recusado': 'Recusado',
                    'pago': 'Pago'
                };
                return statusMap[status] || 'Pendente';
            }

            // Gerar número automático para orçamento
            function gerarNumeroOrcamento() {
                const ano = new Date().getFullYear();
                const numeroInput = document.getElementById('orcamento-numero');

                db.collection('orcamentos')
                    .where('numero', '>=', `ORC-${ano}-0001`)
                    .where('numero', '<=', `ORC-${ano}-9999`)
                    .orderBy('numero', 'desc')
                    .limit(1)
                    .get()
                    .then((snapshot) => {
                        let proximoNumero = 1;

                        if (!snapshot.empty) {
                            const ultimoOrcamento = snapshot.docs[0].data();
                            const ultimoNumero = ultimoOrcamento.numero;
                            const partes = ultimoNumero.split('-');
                            if (partes.length === 3 && partes[2]) {
                                proximoNumero = parseInt(partes[2]) + 1;
                            }
                        }

                        const numeroFormatado = `ORC-${ano}-${proximoNumero.toString().padStart(4, '0')}`;
                        numeroInput.value = numeroFormatado;
                    })
                    .catch((error) => {
                        console.error('Erro ao gerar número do orçamento:', error);
                        numeroInput.value = `ORC-${ano}-0001`;
                    });
            }

            // Calcular total do orçamento
            function calcularTotalOrcamento() {
                const itens = itensContainer.querySelectorAll('.item-orcamento');
                let total = 0;

                itens.forEach(item => {
                    const quantidade = parseFloat(item.querySelector('.item-quantidade')?.value) || 0;
                    const valor = parseFloat(item.querySelector('.item-valor')?.value) || 0;
                    total += quantidade * valor;
                });

                document.getElementById('orcamento-total').textContent = `R$ ${total.toFixed(2)}`;
            }

            // Carregar dados do orçamento para edição
            function carregarOrcamentoParaEdicao(orcamentoId) {
                db.collection('orcamentos').doc(orcamentoId).get()
                    .then((doc) => {
                        if (!doc.exists) {
                            alert('Orçamento não encontrado.');
                            return;
                        }

                        const orcamento = doc.data();
                        orcamentoAtualId = orcamentoId;

                        // Atualizar título
                        modalTitle.textContent = `Editar Orçamento: ${orcamento.numero}`;
                        document.getElementById('btn-salvar-orcamento').textContent = 'Atualizar Orçamento';

                        // Preencher campos
                        document.getElementById('orcamento-numero').value = orcamento.numero;
                        document.getElementById('orcamento-status').value = orcamento.status || 'pendente';
                        document.getElementById('orcamento-cliente').value = orcamento.clienteId || '';
                        document.getElementById('orcamento-veiculo').value = orcamento.veiculoId || '';
                        clienteManualInput.value = orcamento.clienteNome || '';
                        veiculoManualInput.value = orcamento.veiculoDescricao || '';
                        document.getElementById('orcamento-descricao').value = orcamento.descricao || '';
                        document.getElementById('orcamento-observacoes').value = orcamento.observacoes || '';

                        resetarItensOrcamento(orcamento.itens || [{}]);

                        // Mostrar modal
                        orcamentoModal.classList.add('active');
                    })
                    .catch((error) => {
                        console.error('Erro ao carregar orçamento:', error);
                        alert('Erro ao carregar dados do orçamento.');
                    });
            }

            // Configurar eventos
            document.getElementById('btn-novo-orcamento').addEventListener('click', function () {
                orcamentoAtualId = null;
                modalTitle.textContent = 'Novo Orçamento';
                document.getElementById('btn-salvar-orcamento').textContent = 'Salvar Orçamento';

                formOrcamento.reset();
                resetarItensOrcamento();

                // Gerar número automático
                gerarNumeroOrcamento();

                // Mostrar modal
                orcamentoModal.classList.add('active');
            });

            // Adicionar item
            document.getElementById('btn-add-item').addEventListener('click', adicionarItemOrcamento);

            // Fechar modal
            document.querySelectorAll('.modal-close').forEach(btn => {
                btn.addEventListener('click', function () {
                    orcamentoModal.classList.remove('active');
                });
            });

            // Fechar modal ao clicar fora
            orcamentoModal.addEventListener('click', function (e) {
                if (e.target === orcamentoModal) {
                    orcamentoModal.classList.remove('active');
                }
            });

            // Salvar orçamento
            formOrcamento.addEventListener('submit', function (e) {
                e.preventDefault();

                // Coletar itens
                const itens = [];
                itensContainer.querySelectorAll('.item-orcamento').forEach(item => {
                    const descricao = descricaoDoItem(item);
                    const quantidade = parseFloat(item.querySelector('.item-quantidade')?.value) || 0;
                    const valor = parseFloat(item.querySelector('.item-valor')?.value) || 0;

                    if (descricao && quantidade > 0 && valor > 0) {
                        itens.push({
                            descricao: descricao,
                            quantidade: quantidade,
                            valorUnitario: valor,
                            total: quantidade * valor
                        });
                    }
                });

                if (itens.length === 0) {
                    alert('Adicione pelo menos um item ao orçamento.');
                    return;
                }

                const clienteId = document.getElementById('orcamento-cliente').value;
                const veiculoId = document.getElementById('orcamento-veiculo').value;
                const clienteNome = clienteManualInput.value.trim();
                const veiculoDescricao = veiculoManualInput.value.trim();

                const orcamentoData = {
                    numero: document.getElementById('orcamento-numero').value,
                    clienteId: clienteId,
                    veiculoId: veiculoId,
                    clienteNome: clienteId ? '' : clienteNome,
                    veiculoDescricao: veiculoId ? '' : veiculoDescricao,
                    status: document.getElementById('orcamento-status').value,
                    descricao: document.getElementById('orcamento-descricao').value,
                    itens: itens,
                    valorTotal: itens.reduce((total, item) => total + item.total, 0),
                    observacoes: document.getElementById('orcamento-observacoes').value,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                if (orcamentoAtualId) {
                    // Atualizar orçamento existente
                    db.collection('orcamentos').doc(orcamentoAtualId).update(orcamentoData)
                        .then(() => {
                            alert('Orçamento atualizado com sucesso!');
                            orcamentoModal.classList.remove('active');
                            loadOrcamentos();
                        })
                        .catch((error) => {
                            console.error('Erro ao atualizar orçamento:', error);
                            alert('Erro ao atualizar orçamento. Tente novamente.');
                        });
                } else {
                    // Adicionar novo orçamento
                    orcamentoData.data = firebase.firestore.FieldValue.serverTimestamp();
                    orcamentoData.createdAt = firebase.firestore.FieldValue.serverTimestamp();

                    db.collection('orcamentos').add(orcamentoData)
                        .then(() => {
                            alert('Orçamento salvo com sucesso!');
                            orcamentoModal.classList.remove('active');
                            loadOrcamentos();
                        })
                        .catch((error) => {
                            console.error('Erro ao salvar orçamento:', error);
                            alert('Erro ao salvar orçamento. Tente novamente.');
                        });
                }
            });

            // Função para gerar PDF com layout melhorado e margens adequadas
            async function gerarPDF(orcamentoId, buttonElement) {
                try {
                    const { jsPDF } = window.jspdf;

                    // Verificar se a biblioteca está carregada
                    if (!jsPDF || typeof jsPDF !== 'function') {
                        throw new Error('Biblioteca jsPDF não encontrada. Verifique se ela está carregada.');
                    }

                    // Mostrar loading no botão
                    if (buttonElement) {
                        const originalText = buttonElement.textContent;
                        buttonElement.textContent = 'Gerando...';
                        buttonElement.disabled = true;
                    }

                    // Buscar dados do orçamento no Firestore
                    const orcamentoDoc = await db.collection('orcamentos').doc(orcamentoId).get();

                    if (!orcamentoDoc.exists) {
                        throw new Error('Orçamento não encontrado.');
                    }

                    const orcamento = orcamentoDoc.data();

                    // Buscar dados do cliente
                    let clienteNome = 'Cliente não informado';
                    let clienteTelefone = '';
                    if (!orcamento.clienteId && orcamento.clienteNome) {
                        clienteNome = orcamento.clienteNome;
                    }
                    if (orcamento.clienteId) {
                        const clienteDoc = await db.collection('clientes').doc(orcamento.clienteId).get();
                        if (clienteDoc.exists) {
                            const clienteData = clienteDoc.data();
                            clienteNome = clienteData.nome || 'Cliente não informado';
                            clienteTelefone = clienteData.telefone || '';
                        }
                    }

                    // Buscar dados do veículo
                    let veiculoInfo = 'Veículo não informado';
                    let veiculoPlaca = '';
                    if (!orcamento.veiculoId && orcamento.veiculoDescricao) {
                        veiculoInfo = orcamento.veiculoDescricao;
                    }
                    if (orcamento.veiculoId) {
                        const veiculoDoc = await db.collection('veiculos').doc(orcamento.veiculoId).get();
                        if (veiculoDoc.exists) {
                            const veiculoData = veiculoDoc.data();
                            veiculoInfo = `${veiculoData.marca || ''} ${veiculoData.modelo || ''}`.trim();
                            veiculoPlaca = veiculoData.placa || '';
                        }
                    }

                    // Formatando dados
                    const cliente = clienteNome;
                    const clienteTel = clienteTelefone;
                    const data = orcamento.data ? orcamento.data.toDate().toLocaleDateString('pt-BR') : new Date().toLocaleDateString('pt-BR');
                    const placa = veiculoPlaca || 'Não informada';
                    const modelo = veiculoInfo || 'Não informado';
                    const observacoes = orcamento.observacoes || '';
                    const descricaoServico = orcamento.descricao || '';
                    const numeroOrcamento = orcamento.numero || `ORC-${new Date().getFullYear()}-0001`;

                    // Processar itens
                    let totalGeral = 0;
                    const rows = [];

                    if (orcamento.itens && orcamento.itens.length > 0) {
                        orcamento.itens.forEach((item, index) => {
                            const descricao = item.descricao || `Item ${index + 1}`;
                            const qtd = item.quantidade || 0;
                            const valor = item.valorUnitario || 0;
                            const total = qtd * valor;

                            totalGeral += total;
                            rows.push([
                                descricao,
                                qtd.toString(),
                                `R$ ${valor.toFixed(2).replace('.', ',')}`,

                    alert('Erro ao gerar o PDF: ' + error.message);
                }

            // Função auxiliar para criar tabela manualmente com margens
            function criarTabelaManualComMargens(doc, rows, marginLeft, marginRight, pageWidth, startY, contentWidth) {
                let y = startY;

                // Larguras das colunas (proporcionais ao conteúdo disponível)
                const colWidths = [
                    contentWidth * 0.6,  // Descrição: 60%
                    contentWidth * 0.1,  // Qtd: 10%
                    contentWidth * 0.15, // Unitário: 15%
                    contentWidth * 0.15  // Total: 15%
                ];

                // Cabeçalho da tabela - BRANCO (alterado)
                doc.setFillColor(255, 255, 255); // Branco
                doc.rect(marginLeft, y, contentWidth, 12, 'F');

                // Bordas do cabeçalho
                doc.setDrawColor(0, 0, 0);
                doc.setLineWidth(0.5);
                doc.rect(marginLeft, y, contentWidth, 12);

                doc.setTextColor(0, 0, 0); // Texto preto
                doc.setFontSize(11);
                doc.setFont('helvetica', 'bold');

                let x = marginLeft;
                const headers = ['DESCRIÇÃO', 'QTD', 'VALOR', 'TOTAL'];

                // Desenhar cabeçalhos com alinhamento adequado
                doc.text(headers[0], x + 5, y + 8); // Descrição alinhada à esquerda
                doc.text(headers[1], x + colWidths[0] + (colWidths[1] / 2), y + 8, { align: 'center' }); // Qtd centralizada
                doc.text(headers[2], x + colWidths[0] + colWidths[1] + (colWidths[2] / 2), y + 8, { align: 'center' }); // Valor centralizado
                doc.text(headers[3], x + colWidths[0] + colWidths[1] + colWidths[2] + colWidths[3] - 5, y + 8, { align: 'right' }); // Total alinhado à direita

                y += 15;
                doc.setTextColor(0, 0, 0);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(10);

                // Linhas da tabela
                for (let row of rows) {
                    x = marginLeft;

                    // Desenhar linha de fundo alternada para melhor legibilidade
                    if (rows.indexOf(row) % 2 === 0) {
                        doc.setFillColor(245, 245, 245);
                        doc.rect(x, y - 3, contentWidth, 10, 'F');
                    }

                    // Descrição (coluna 0)
                    const descricao = row[0];
                    const descricaoLines = doc.splitTextToSize(descricao, colWidths[0] - 10);
                    doc.text(descricaoLines, x + 5, y);

                    // Qtd (coluna 1)
                    doc.text(row[1], x + colWidths[0] + (colWidths[1] / 2), y, { align: 'center' });

                    // Valor (coluna 2)
                    doc.text(row[2], x + colWidths[0] + colWidths[1] + (colWidths[2] / 2), y, { align: 'center' });

                    // Total (coluna 3)
                    doc.text(row[3], x + colWidths[0] + colWidths[1] + colWidths[2] + colWidths[3] - 5, y, { align: 'right' });

                    // Ajustar altura baseado no número de linhas da descrição
                    const alturaLinha = Math.max(10, descricaoLines.length * 10);
                    y += alturaLinha;

                    // Linha divisória entre itens
                    if (rows.indexOf(row) < rows.length - 1) {
                        doc.setDrawColor(220, 220, 220);
                        doc.setLineWidth(0.2);
                        doc.line(marginLeft, y - 2, pageWidth - marginRight, y - 2);
                    }
                }

                // Linha final da tabela
                doc.setDrawColor(100, 100, 100);
                doc.setLineWidth(0.5);
                doc.line(marginLeft, y, pageWidth - marginRight, y);

                return y + 10;
            }

                let x = margin;
                const headers = ['DESCRIÇÃO', 'QUANTIDADE', 'VALOR', 'TOTAL'];

                for (let i = 0; i < headers.length; i++) {
                    if (i === 3) {
                        doc.text(headers[i], x + colWidths[i] - 5, y + 7, { align: 'right' });
                    } else if (i === 0) {
                        doc.text(headers[i], x + 5, y + 7);

                        doc.text(headers[i], x + colWidths[i] / 2, y + 7, { align: 'center' });
                    }
                    x += colWidths[i];
                }

                y += 15;
                doc.setTextColor(0, 0, 0);
                doc.setFont('helvetica', 'normal');
                doc.setFontSize(9);

                // Linhas da tabela
                for (let row of rows) {

            // Expor funções para os botões na tabela
            window.visualizarOrcamento = function (orcamentoId) {
                Promise.all([
                    db.collection('orcamentos').doc(orcamentoId).get(),
                    db.collection('clientes').get(),
                    db.collection('veiculos').get()
                ])
                    .then(([orcamentoDoc, clientesSnapshot, veiculosSnapshot]) => {
                        if (!orcamentoDoc.exists) {
                            alert('Orçamento não encontrado.');
                            return;
                        }

                        const orcamento = orcamentoDoc.data();

                        // Criar mapas
                        const clientesMapLocal = {};
                        clientesSnapshot.forEach(doc => {
                            clientesMapLocal[doc.id] = doc.data();
                        });

                        const veiculosMapLocal = {};
                        veiculosSnapshot.forEach(doc => {
                            veiculosMapLocal[doc.id] = doc.data();
                        });

                        const cliente = clientesMapLocal[orcamento.clienteId] || { nome: orcamento.clienteNome || 'Cliente avulso' };
                        const veiculo = veiculosMapLocal[orcamento.veiculoId] || { placa: '', marca: orcamento.veiculoDescricao || 'Veículo avulso', modelo: '' };

                        // Criar modal de visualização
                        const modal = document.createElement('div');
                        modal.className = 'modal active';
                        modal.innerHTML = `
                        <div class="modal-content" style="max-width: 800px;">
                            <button class="modal-close">&times;</button>
                            <h2 class="modal-title">Orçamento ${orcamento.numero}</h2>
                            
                            <div class="detail-card">
                                <h3>Informações do Orçamento</h3>
                                <div class="detail-row">
                                    <div class="detail-label">Número:</div>
                                    <div class="detail-value">${orcamento.numero}</div>
                                </div>
                                <div class="detail-row">
                                    <div class="detail-label">Data:</div>
                                    <div class="detail-value">${orcamento.data ? orcamento.data.toDate().toLocaleDateString('pt-BR') : ''}</div>
                                </div>
                                <div class="detail-row">
                                    <div class="detail-label">Status:</div>
                                    <div class="detail-value"><span class="status-badge status-${orcamento.status || 'pendente'}">${getStatusText(orcamento.status)}</span></div>
                                </div>
                            </div>
                            
                            <div class="detail-card">
                                <h3>Cliente</h3>
                                <div class="detail-row">
                                    <div class="detail-label">Nome:</div>
                                    <div class="detail-value">${cliente.nome || 'Não informado'}</div>
                                </div>
                                <div class="detail-row">
                                    <div class="detail-label">Telefone:</div>
                                    <div class="detail-value">${cliente.telefone || 'Não informado'}</div>
                                </div>
                            </div>
                            
                            <div class="detail-card">
                                <h3>Veículo</h3>
                                <div class="detail-row">
                                    <div class="detail-label">Placa:</div>
                                    <div class="detail-value">${veiculo.placa || 'Não informado'}</div>
                                </div>
                                <div class="detail-row">
                                    <div class="detail-label">Marca/Modelo:</div>
                                    <div class="detail-value">${veiculo.marca || ''} ${veiculo.modelo || ''}</div>
                                </div>
                            </div>
                            
                            <div class="detail-card">
                                <h3>Itens do Orçamento</h3>
                                <div class="table-container">
                                    <table class="data-table">
                                        <thead>
                                            <tr>
                                                <th>Descrição</th>
                                                <th>Quantidade</th>
                                                <th>Valor Unitário</th>
                                                <th>Total</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            ${orcamento.itens ? orcamento.itens.map(item => `
                                                <tr>
                                                    <td>${item.descricao}</td>
                                                    <td>${item.quantidade}</td>
                                                    <td>R$ ${item.valorUnitario.toFixed(2)}</td>
                                                    <td>R$ ${item.total.toFixed(2)}</td>
                                                </tr>
                                            `).join('') : ''}
                                            <tr>
                                                <td colspan="3" style="text-align: right; font-weight: bold;">Total:</td>
                                                <td style="font-weight: bold;">R$ ${orcamento.valorTotal ? orcamento.valorTotal.toFixed(2) : '0,00'}</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            
                            <div class="form-actions">
                                <button type="button" class="btn btn-warning" onclick="editarOrcamento('${orcamentoId}')">Editar</button>
                                <button type="button" class="btn btn-success" onclick="gerarPDF('${orcamentoId}')">Gerar PDF</button>
                                <button type="button" class="btn btn-secondary modal-close">Fechar</button>
                            </div>
                        </div>
                    `;

                        document.body.appendChild(modal);

                        // Configurar fechamento do modal
                        const closeBtn = modal.querySelector('.modal-close');
                        closeBtn.addEventListener('click', () => modal.remove());
                        modal.addEventListener('click', (e) => {
                            if (e.target === modal) {
                                modal.remove();
                            }
                        });
                    })
                    .catch((error) => {
                        console.error('Erro ao carregar orçamento:', error);
                        alert('Erro ao carregar dados do orçamento.');
                    });
            };

            window.editarOrcamento = function (orcamentoId) {
                carregarOrcamentoParaEdicao(orcamentoId);
            };

            // Expor a função gerarPDF globalmente
            window.gerarPDF = gerarPDF;

            window.excluirOrcamento = function (orcamentoId) {
                if (confirm('Tem certeza que deseja excluir este orçamento?')) {
                    db.collection('orcamentos').doc(orcamentoId).delete()
                        .then(() => {
                            alert('Orçamento excluído com sucesso!');
                            loadOrcamentos();
                        })
                        .catch((error) => {
                            console.error('Erro ao excluir orçamento:', error);
                            alert('Erro ao excluir orçamento. Tente novamente.');
                        });
                }
            };
        });
    </script>
</body>

</html>
